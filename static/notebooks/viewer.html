<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databricks Notebook Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1b1b2f;
    color: #e0e0e8;
    padding: 0;
  }
  .nb-header {
    background: #2d2d44;
    border-bottom: 1px solid #3a3a55;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nb-header .logo {
    font-weight: 700;
    color: #ff6f61;
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  .nb-header .divider { color: #555; }
  .nb-header .filename {
    color: #ccc;
    font-size: 14px;
  }
  .nb-header .badge {
    background: #2ecc71;
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: auto;
  }
  .nb-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }
  .cell {
    margin-bottom: 16px;
    border-radius: 8px;
    overflow: hidden;
  }
  .cell-md {
    padding: 16px 24px;
  }
  .cell-md h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .cell-md h2 { font-size: 22px; font-weight: 600; color: #ddd; margin-top: 24px; margin-bottom: 8px; border-bottom: 1px solid #3a3a55; padding-bottom: 8px; }
  .cell-md h3 { font-size: 18px; font-weight: 600; color: #ccc; margin-top: 16px; margin-bottom: 6px; }
  .cell-md p { color: #aaa; line-height: 1.7; margin-bottom: 8px; }
  .cell-md ul, .cell-md ol { color: #aaa; margin-left: 24px; margin-bottom: 8px; line-height: 1.7; }
  .cell-md strong { color: #e0e0e8; }
  .cell-md table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  .cell-md th { background: #2d2d44; color: #aaa; text-align: left; padding: 8px 12px; border: 1px solid #3a3a55; font-size: 13px; }
  .cell-md td { padding: 8px 12px; border: 1px solid #3a3a55; color: #ccc; font-size: 13px; }
  .cell-md a { color: #64b5f6; }
  .cell-code {
    background: #1e1e32;
    border: 1px solid #3a3a55;
    border-radius: 8px;
  }
  .cell-toolbar {
    background: #252540;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #3a3a55;
  }
  .cell-num {
    color: #666;
    font-size: 12px;
    font-family: monospace;
  }
  .cell-lang {
    color: #888;
    font-size: 11px;
    margin-left: auto;
    background: #2d2d44;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .cell-code pre {
    padding: 16px;
    overflow-x: auto;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #d4d4d4;
  }
  .cell-output {
    border-top: 1px solid #3a3a55;
    padding: 12px 16px;
    background: #1a1a2e;
    font-family: 'SF Mono', monospace;
    font-size: 12px;
    color: #aaa;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }
  .cell-output .success { color: #2ecc71; }
  .cell-output .warn { color: #f39c12; }
  .cell-output .info { color: #64b5f6; }
  /* Syntax colors */
  .kw { color: #c792ea; }
  .str { color: #c3e88d; }
  .num { color: #f78c6c; }
  .fn { color: #82aaff; }
  .cm { color: #546e7a; }
  .op { color: #89ddff; }
</style>
</head>
<body>
<div class="nb-header">
  <span class="logo">DATABRICKS</span>
  <span class="divider">/</span>
  <span class="filename">03_full_pipeline_databricks</span>
  <span class="badge">Serverless</span>
</div>
<div class="nb-container" id="notebook-content">
  <p style="color:#666; padding: 40px; text-align:center;">Loading notebook...</p>
</div>

<script>
// Fetch the actual Databricks HTML and extract the rendered content
fetch('full_pipeline.html')
  .then(r => r.text())
  .then(html => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const container = document.getElementById('notebook-content');

    // Try to find the notebook content in the Databricks HTML
    const body = doc.querySelector('body');
    if (body) {
      container.innerHTML = body.innerHTML;
      // Apply our dark theme to any embedded styles
      container.querySelectorAll('*').forEach(el => {
        el.style.maxWidth = '100%';
      });
    }
  })
  .catch(err => {
    document.getElementById('notebook-content').innerHTML =
      '<p style="color:#e74c3c; padding:40px;">Failed to load notebook: ' + err + '</p>';
  });
</script>
</body>
</html>
